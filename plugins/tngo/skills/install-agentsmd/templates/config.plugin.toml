model = "gpt-5.5"
review_model = "gpt-5.4"
model_reasoning_effort = "xhigh"
plan_mode_reasoning_effort = "xhigh"
model_reasoning_summary = "none"          # was "detailed" — saves output tokens; reasoning depth unchanged
show_raw_agent_reasoning = false          # was true — cuts raw reasoning stream overhead
hide_agent_reasoning = false
model_verbosity = "medium"
model_context_window = 1_000_000
model_auto_compact_token_limit = 1_000_000
personality = "pragmatic"
suppress_unstable_features_warning = true
web_search = "live"
approvals_reviewer = "user"
approval_policy = "never"
service_tier = "default"
sandbox_mode = "danger-full-access"

[ghost_snapshot]
ignore_large_untracked_files = 524288     # skip untracked files > 512KB from snapshots
ignore_large_untracked_dirs = 200         # skip untracked dirs with 200+ files

[features]
multi_agent = true
goals = true
apps = true                              # disable codex_apps MCP tools (github, gmail, calendar, drive)
hooks = true
unified_exec = true
shell_snapshot = true
steer = true
fast_mode = true
enable_request_compression = true         # explicit — Zstd compress outgoing requests
terminal_resize_reflow = true
prevent_idle_sleep = true
js_repl = false
memories = true

[agents]
max_depth = 1

[features.multi_agent_v2]
enabled = true
max_concurrent_threads_per_session = 6 # Counts the root thread too. 5 = root + up to 4 live child agents.
min_wait_timeout_ms = 10000
default_wait_timeout_ms = 60000
max_wait_timeout_ms = 3600000
hide_spawn_agent_metadata = false
usage_hint_enabled = true
root_agent_usage_hint_text = ""
subagent_usage_hint_text = "DO NOT call spawn_agent."
